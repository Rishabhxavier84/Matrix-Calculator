<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrix Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <form action="{{ url_for('operations')}}" method="post">
      <div class="m-5 p-5 container border rounded">
        <h1 class="mb-1 p-5">Matrix Calculator</h1>
        <!--   add => function name    -->
        <!-- <input type="text" name="mat1" id="mat1" placeholder="Enter first matrix">
        <input type="text" name="mat2" id="mat2" placeholder="Enter second matrix"> -->

        <div class="form-floating">
          <textarea
            class="form-control"
            placeholder="Enter Matrix 2 here"
            id="floatingTextarea2"
            style="height: 100px"
            name="mat1"
            id="mat1"
          ></textarea>
          <label for="floatingTextarea2">Matrix 1</label>
        </div>
        <br />
        <div class="form-floating">
          <textarea
            class="form-control"
            placeholder="Enter Matrix 2 here"
            id="floatingTextarea2"
            style="height: 100px"
            name="mat2"
            id="mat2"
          ></textarea>
          <label for="floatingTextarea2">Matrix 2</label>
        </div>
        <br />
        <select
          class="form-select"
          aria-label="Select the operation"
          name="operations"
          id="operations"
        >
          <optgroup label="Matrix 1">
            <option value="transpose">Transpose</option>
            <option value="shape">Shape</option>
            <option value="flip">Flip</option>
          </optgroup>
          <optgroup label="Matrix 1 and Matrix 2">
            <option value="add">Addition</option>
            <option value="sub">Subtraction</option>
            <option value="norm_mul">Normal Multiplication</option>
            <option value="div">Division</option>
            <option value="mat_mul">Matrix Multiplication</option>
          </optgroup>
        </select>
        <br />
        <button type="submit" class="btn btn-primary">Result</button>
      </div>
    </form>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
